<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Bridge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }

    #ar-container { width: 100vw; height: 100vh; position: relative; }

    /* Transparent touch surface — only active while the image is tracked */
    #touch-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      cursor: grab;
    }
    #touch-overlay.active { pointer-events: auto; }
    #touch-overlay:active { cursor: grabbing; }

    .pill {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      font-weight: 500;
      background: rgba(0, 0, 0, 0.52);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 8px 20px;
      border-radius: 24px;
      z-index: 200;
      white-space: nowrap;
      pointer-events: none;
      transition: opacity 0.45s ease;
    }

    #status { top: 28px; }
    #hint   { bottom: 56px; opacity: 0; }
  </style>
</head>
<body>
  <div id="ar-container"></div>
  <div id="touch-overlay"></div>
  <div id="status" class="pill">Starting…</div>
  <div id="hint"   class="pill">Drag to rotate</div>

  <!-- Official MindAR pattern: importmap resolves THREE, addons, and mindar-image-three -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.147.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE       from 'three';
    import { GLTFLoader }   from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader }  from 'three/addons/loaders/DRACOLoader.js';
    import { MindARThree }  from 'mindar-image-three';

    const container = document.getElementById('ar-container');
    const overlay   = document.getElementById('touch-overlay');
    const statusEl  = document.getElementById('status');
    const hintEl    = document.getElementById('hint');

    try {
      // ── MindAR ──────────────────────────────────────────────────────────────
      const mindarThree = new MindARThree({
        container,
        imageTargetSrc: './targets.mind',
        // Pose smoothing (One Euro Filter) — reduces tracking jitter/shake.
        // filterMinCF: lower = smoother when the card is held still (slightly more lag).
        // filterBeta:  lower = smoother while the card is moving (slightly more lag).
        filterMinCF: 0.0001,   // default 0.001  → ~10× more smoothing at rest
        filterBeta: 10,        // default 1000   → much steadier during motion
      });
      const { renderer, scene, camera } = mindarThree;

      // ── Lighting ────────────────────────────────────────────────────────────
      scene.add(new THREE.AmbientLight(0xffffff, 0.75));
      const sun = new THREE.DirectionalLight(0xfff4d6, 1.4);
      sun.position.set(2, 5, 3);
      scene.add(sun);
      const fill = new THREE.DirectionalLight(0xd6e8ff, 0.4);
      fill.position.set(-3, 0, -2);
      scene.add(fill);

      // ── Rotation state ──────────────────────────────────────────────────────
      const userQuat    = new THREE.Quaternion();  // cumulative drag rotation
      let   autoAngle   = 0;                        // turntable spin accumulator
      let   autoActive  = true;
      let   resumeTimer = null;

      const AUTO_SPEED       = 0.5;    // rad / s
      const RESUME_DELAY_MS  = 2000;   // rest before auto-spin resumes
      const DRAG_SENSITIVITY = 0.004;  // pointer px → radians

      // Tip the model upright: rotate +90° about X so the model's own up-axis (Y)
      // points OUT of the card surface. The card then acts as the floor.
      // Flip the sign to -Math.PI/2 if the model ends up facing the wrong way.
      const BASE_TILT_X = Math.PI / 2;

      // Auto-spin around the card's normal (Z) → turntable on the card floor,
      // instead of the in-plane vertical (which would tumble an upright model).
      const _SPIN_AXIS = new THREE.Vector3(0, 0, 1);

      const _dragAxis  = new THREE.Vector3();
      const _dragDelta = new THREE.Quaternion();
      const _autoQ     = new THREE.Quaternion();

      // ── Touch trackball ───────────────────────────────────────────────────--
      let dragging = false;
      let prevX = 0, prevY = 0;

      overlay.addEventListener('pointerdown', (e) => {
        overlay.setPointerCapture(e.pointerId);
        dragging = true;
        prevX = e.clientX;
        prevY = e.clientY;
        autoActive = false;
        clearTimeout(resumeTimer);
        hintEl.style.opacity = '0';
        e.preventDefault();
      });

      overlay.addEventListener('pointermove', (e) => {
        if (!dragging) return;
        const dx = e.clientX - prevX;
        const dy = e.clientY - prevY;
        prevX = e.clientX;
        prevY = e.clientY;
        const mag = Math.hypot(dx, dy);
        if (mag < 0.5) return;
        // Axis perpendicular to drag → free-axis trackball feel
        _dragAxis.set(-dy / mag, dx / mag, 0);
        _dragDelta.setFromAxisAngle(_dragAxis, mag * DRAG_SENSITIVITY);
        userQuat.premultiply(_dragDelta);   // apply in world space
        e.preventDefault();
      });

      const endDrag = () => {
        if (!dragging) return;
        dragging = false;
        resumeTimer = setTimeout(() => { autoActive = true; }, RESUME_DELAY_MS);
      };
      overlay.addEventListener('pointerup',     endDrag);
      overlay.addEventListener('pointercancel', endDrag);

      // ── Anchor ──────────────────────────────────────────────────────────────
      const anchor = mindarThree.addAnchor(0);
      let hintShown = false;
      let model = null;       // the loaded GLB scene (carries the static tilt)
      let pivot = null;       // parent we spin/drag; null until the GLB loads
      let carTick = null;     // per-frame car updater; null until cars are built

      anchor.onTargetFound = () => {
        statusEl.style.opacity = '0';
        overlay.classList.add('active');
        if (model && !hintShown) {
          hintShown = true;
          hintEl.style.opacity = '1';
          setTimeout(() => { hintEl.style.opacity = '0'; }, 2800);
        }
      };
      anchor.onTargetLost = () => {
        statusEl.textContent = 'Point camera at image…';
        statusEl.style.opacity = '1';
        overlay.classList.remove('active');
      };

      // ── Animation loop ────────────────────────────────────────────────────--
      const clock = new THREE.Clock();
      renderer.setAnimationLoop(() => {
        const dt = clock.getDelta();
        if (pivot) {
          if (autoActive) autoAngle += AUTO_SPEED * dt;
          // Turntable auto-spin (around card normal) composed with user trackball
          _autoQ.setFromAxisAngle(_SPIN_AXIS, autoAngle);
          pivot.quaternion.copy(_autoQ).multiply(userQuat);
        }
        if (carTick) carTick(dt);
        renderer.render(scene, camera);
      });

      // ── Loaders ───────────────────────────────────────────────────────────--
      const dracoLoader = new DRACOLoader();
      dracoLoader.setDecoderPath(
        'https://cdn.jsdelivr.net/npm/three@0.147.0/examples/jsm/libs/draco/gltf/'
      );
      const gltfLoader = new GLTFLoader();
      gltfLoader.setDRACOLoader(dracoLoader);

      const loadGLB = (url) => new Promise((resolve, reject) =>
        gltfLoader.load(url, resolve, undefined, reject)
      );

      // ── Start camera + load both GLBs in parallel ─────────────────────────--
      const [, gltf, carsGltf] = await Promise.all([
        mindarThree.start(),
        loadGLB('./bridge_venetian.glb'),
        loadGLB('./low-poly_cars.glb'),
      ]);

      statusEl.textContent = 'Point camera at image…';

      // Bridge's raw local bounds (filled in below) — used to place cars
      const bridgeMin = new THREE.Vector3();
      const bridgeMax = new THREE.Vector3();

      // ── Fit, tilt, and attach model ───────────────────────────────────────--
      model = gltf.scene;
      {
        // 1) Scale to ~70% of the image-target width
        const box0 = new THREE.Box3().setFromObject(model);
        const size = box0.getSize(new THREE.Vector3());
        bridgeMin.copy(box0.min);            // raw local bounds, before scale/tilt
        bridgeMax.copy(box0.max);
        const scale = 0.7 / Math.max(size.x, size.y, size.z);
        model.scale.setScalar(scale);

        // 2) Bake the upright tilt into the model (static — never touched again)
        model.quaternion.setFromAxisAngle(new THREE.Vector3(1, 0, 0), BASE_TILT_X);

        // 3) Re-measure AFTER scale + tilt, then recenter on X/Y and sit the
        //    model's base on the card plane (z = 0), so the card is the floor.
        model.updateMatrixWorld(true);
        const box1   = new THREE.Box3().setFromObject(model);
        const center = box1.getCenter(new THREE.Vector3());
        const min    = box1.min;
        model.position.set(
          model.position.x - center.x,   // centre horizontally on the card
          model.position.y - center.y,
          model.position.z - min.z,      // base flush with the card surface
        );
      }

      // Pivot carries the spin + drag; model (with its baked tilt) lives inside.
      pivot = new THREE.Group();
      pivot.add(model);
      anchor.group.add(pivot);

      // ── Moving cars ───────────────────────────────────────────────────────--
      // Cars are children of `model`, so they inherit the bridge's scale, tilt,
      // and spin — they ride the bridge and stay anchored to it.
      //
      // The bridge runs along its local X axis. Cars sit at a fixed deck height
      // (Y) and lane (Z), and loop along X. All values are in the bridge's raw
      // local units — tune them against the live AR view.
      const spanX = bridgeMax.x - bridgeMin.x;   // bridge length (~657)
      const widthZ = bridgeMax.z - bridgeMin.z;  // bridge width  (~295)

      // ↓↓↓ TUNABLES — adjust while watching it on-device ↓↓↓
      const CAR_LEN_FRAC = 0.06;   // car length as a fraction of bridge span
      const CAR_DECK_Y   = 205;    // height of the road surface (local Y, 0..230)
      const CAR_LANE_Z   = widthZ * 0.12;  // lane offset from centre (±)
      const CAR_SPEED    = 0.12;   // laps per second (fraction of span / sec)
      const CAR_MARGIN   = 0.06;   // skip this fraction at each end (off-bridge)
      // Each entry = one car instance: lane (Z), direction, start progress 0..1
      const CAR_LAYOUT = [
        { lane:  CAR_LANE_Z, dir: +1, p: 0.00 },
        { lane:  CAR_LANE_Z, dir: +1, p: 0.55 },
        { lane: -CAR_LANE_Z, dir: -1, p: 0.30 },
        { lane: -CAR_LANE_Z, dir: -1, p: 0.80 },
      ];
      // ↑↑↑ TUNABLES ↑↑↑

      const movingCars = [];
      {
        const carSrc = carsGltf.scene;

        // Normalise the pack: centre it, drop its base to y=0, and find its
        // forward length (the car's longest axis is its local Z).
        const cbox  = new THREE.Box3().setFromObject(carSrc);
        const csize = cbox.getSize(new THREE.Vector3());
        const ccen  = cbox.getCenter(new THREE.Vector3());
        const carScale = (spanX * CAR_LEN_FRAC) / csize.z;

        for (const cfg of CAR_LAYOUT) {
          const car = carSrc.clone(true);

          // Recentre the clone on its own origin, base at y=0
          car.position.set(-ccen.x, -cbox.min.y, -ccen.z);

          // Wrap so we can scale/rotate/translate cleanly in bridge-local space
          const wrap = new THREE.Group();
          wrap.add(car);
          wrap.scale.setScalar(carScale);

          // Car forward is +Z; rotate about Y so it faces along ±X
          wrap.rotation.y = cfg.dir > 0 ? Math.PI / 2 : -Math.PI / 2;

          model.add(wrap);
          movingCars.push({ wrap, dir: cfg.dir, p: cfg.p, lane: cfg.lane });
        }
      }

      // Advance one car's loop position and write its transform
      const usableSpan = spanX * (1 - 2 * CAR_MARGIN);
      const startX     = bridgeMin.x + spanX * CAR_MARGIN;
      function updateCars(dt) {
        for (const c of movingCars) {
          c.p += CAR_SPEED * dt;
          if (c.p > 1) c.p -= 1;
          const along = c.dir > 0 ? c.p : (1 - c.p);   // travel direction
          c.wrap.position.set(
            startX + along * usableSpan,   // X — along the bridge
            CAR_DECK_Y,                    // Y — deck height
            c.lane,                        // Z — lane
          );
        }
      }
      updateCars(0);        // place cars at their starting positions
      carTick = updateCars; // start animating them every frame

      // If target was already found while the GLB was still loading, show hint now
      if (!hintShown && overlay.classList.contains('active')) {
        hintShown = true;
        hintEl.style.opacity = '1';
        setTimeout(() => { hintEl.style.opacity = '0'; }, 2800);
      }

    } catch (err) {
      statusEl.textContent = 'Error: ' + err.message;
      statusEl.style.opacity = '1';
    }
  </script>
</body>
</html>
