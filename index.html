<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Bridge – MindAR Module Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    #ar-container { width: 100vw; height: 100vh; }
    #status {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%);
      color: #fff; font-family: -apple-system, sans-serif; font-size: 15px;
      background: rgba(0,0,0,0.7); padding: 10px 20px;
      border-radius: 20px; z-index: 9999; white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="ar-container"></div>
  <div id="status">Loading modules…</div>

  <!-- Official MindAR pattern: importmap resolves THREE + mindar-image-three -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.147.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>

  <script type="module">
    const s = document.getElementById('status');
    try {
      const THREE = await import('three');
      const { MindARThree } = await import('mindar-image-three');
      s.textContent = 'Modules loaded (THREE r' + THREE.REVISION + ') — starting…';

      const mindarThree = new MindARThree({
        container: document.getElementById('ar-container'),
        imageTargetSrc: './targets.mind',
      });
      const { renderer, scene, camera } = mindarThree;

      scene.add(new THREE.AmbientLight(0xffffff, 1));
      const cube = new THREE.Mesh(
        new THREE.BoxGeometry(0.1, 0.1, 0.1),
        new THREE.MeshBasicMaterial({ color: 0xff0000 })
      );
      const anchor = mindarThree.addAnchor(0);
      anchor.group.add(cube);
      anchor.onTargetFound = () => { s.textContent = '✓ Image detected!'; };
      anchor.onTargetLost  = () => { s.textContent = 'Point camera at image…'; };

      renderer.setAnimationLoop(() => renderer.render(scene, camera));

      await mindarThree.start();
      s.textContent = 'Point camera at image…';
    } catch (err) {
      s.textContent = 'ERROR: ' + err.message;
    }
  </script>
</body>
</html>
