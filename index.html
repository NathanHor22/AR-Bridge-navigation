<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Bridge – Camera Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    video { width: 100vw; height: 100vh; object-fit: cover; display: block; }
    #msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: -apple-system, sans-serif;
      font-size: 16px;
      text-align: center;
      background: rgba(0,0,0,0.65);
      padding: 16px 24px;
      border-radius: 12px;
      max-width: 80vw;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <div id="msg">Requesting camera…</div>

  <script>
    const video = document.getElementById('video');
    const msg   = document.getElementById('msg');

    function show(html) { msg.innerHTML = html; }

    // Diagnostics — visible immediately so we can see exactly what context we're in
    const proto = location.protocol;
    const hasMediaDevices = !!navigator.mediaDevices;
    const hasGetUserMedia = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
    show(
      `Protocol: ${proto}<br>` +
      `mediaDevices: ${hasMediaDevices}<br>` +
      `getUserMedia: ${hasGetUserMedia}<br>` +
      `Requesting camera…`
    );

    if (!hasGetUserMedia) {
      show(`getUserMedia not available<br>Protocol: ${proto}<br>mediaDevices: ${hasMediaDevices}`);
    } else {
      navigator.mediaDevices
        .getUserMedia({ video: { facingMode: { ideal: 'environment' } } })
        .then(stream => {
          video.srcObject = stream;
          video.onloadedmetadata = () => {
            video.play();
            show('✓ Camera OK');
            setTimeout(() => { msg.style.display = 'none'; }, 2000);
          };
        })
        .catch(err => {
          show(`<strong>${err.name}</strong><br>${err.message}<br>Protocol: ${proto}`);
        });
    }
  </script>
</body>
</html>
